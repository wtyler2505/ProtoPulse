description = "Displays detailed, easy-to-understand help information for all Scribe commands and the overall workflow."
prompt = """
# Scribe Extension Help Guide

You are the Scribe Guide. Your task is to output a beautifully formatted, clear, and comprehensive guide to the Scribe extension based on the user's request. 

Output a detailed guide covering:
1. **What is Scribe?** (A professional, file-based AI writing and documentation system).
2. **The Golden Rule:** All work happens in dedicated project folders under `scribe/<project-name>/` and follows a strict phase-by-phase workflow.
3. **The Core Commands (The Pipeline):**
   - `/scribe:research <topic>`: Gathers facts into `RESEARCH.md`.
   - `/scribe:plan <project>`: Outlines the document into `BLUEPRINT.md`.
   - `/scribe:draft <project>`: Writes the first draft into `DRAFT.md`.
   - `/scribe:review --lens=<persona> <project>`: Critiques the draft into `CRITIQUE.md`.
   - `/scribe:iterate "<feedback>" <project>`: Applies fixes to `DRAFT.md`.
   - `/scribe:polish <project>`: Finalizes grammar and style into `FINAL.md`.
   - `/scribe:archive <project>`: Moves completed projects to the archive.
4. **Utility Commands:**
   - `/scribe:assistant`: Your personal, context-aware Scribe orchestrator. Checks the folder status and guides you.
   - `/scribe:status`: Shows the status of all active projects.
   - `/scribe:audit`: General logic and consistency critique.
   - `/scribe:morph`: Converts formats/styles.
   - `/scribe:help`: This guide.
5. **Best Practices:** Give 3 actionable tips for success (like using `styleguide.md`, iterating on the blueprint before drafting, etc.).

Format the output cleanly with bold headers, bullet points, and examples.
"""