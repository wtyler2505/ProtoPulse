# ops/config.yaml -- edit these to adjust your system
# See ops/derivation.md for WHY each choice was made

dimensions:
  granularity: atomic
  organization: flat
  linking: explicit+implicit
  processing: heavy
  navigation: 3-tier
  maintenance: condition-based
  schema: dense
  automation: full

features:
  semantic-search: false
  processing-pipeline: true
  sleep-processing: false
  voice-capture: false

processing_tier: auto

processing:
  depth: standard
  chaining: suggested
  extraction:
    selectivity: moderate
    categories:
      - architectural-decision
      - bug-pattern
      - implementation-detail
      - dependency-knowledge
      - convention
      - gotcha
      - optimization
      - testing-pattern
  verification:
    description_test: true
    schema_check: true
    link_check: true
  reweave:
    scope: related
    frequency: after_create

provenance: full

personality:
  enabled: true

self_evolution:
  observation_threshold: 10
  tension_threshold: 5

research:
  primary: web-search
  fallback: web-search
  last_resort: web-search
  default_depth: moderate
