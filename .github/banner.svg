<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <!-- Background -->
  <rect width="1200" height="320" fill="#060A13"/>

  <!-- PCB grid dots -->
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#152038"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trace-fade-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00F0FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="trace-fade-r" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00F0FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" fill="url(#dots)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- Left circuit traces -->
  <g stroke="url(#trace-fade-l)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 155 L 90 155 L 110 130 L 220 130 L 240 150"/>
    <path d="M 0 175 L 60 175 L 75 195 L 160 195 L 185 170"/>
    <path d="M 0 135 L 40 135 L 55 115 L 150 115"/>
    <path d="M 0 195 L 110 195 L 130 215 L 200 215"/>
  </g>
  <!-- Left pads -->
  <g fill="#00F0FF" opacity="0.2">
    <circle cx="240" cy="150" r="3.5"/>
    <circle cx="185" cy="170" r="3.5"/>
    <circle cx="150" cy="115" r="3.5"/>
    <circle cx="200" cy="215" r="3.5"/>
  </g>

  <!-- Right circuit traces -->
  <g stroke="url(#trace-fade-r)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 1200 155 L 1110 155 L 1090 130 L 980 130 L 960 150"/>
    <path d="M 1200 175 L 1140 175 L 1125 195 L 1040 195 L 1015 170"/>
    <path d="M 1200 135 L 1160 135 L 1145 115 L 1050 115"/>
    <path d="M 1200 195 L 1090 195 L 1070 215 L 1000 215"/>
  </g>
  <!-- Right pads -->
  <g fill="#00F0FF" opacity="0.2">
    <circle cx="960" cy="150" r="3.5"/>
    <circle cx="1015" cy="170" r="3.5"/>
    <circle cx="1050" cy="115" r="3.5"/>
    <circle cx="1000" cy="215" r="3.5"/>
  </g>

  <!-- IC chip outline (left decorative) -->
  <g stroke="#00F0FF" stroke-width="0.8" opacity="0.08">
    <rect x="30" y="60" width="50" height="30" rx="2"/>
    <line x1="30" y1="68" x2="20" y2="68"/>
    <line x1="30" y1="82" x2="20" y2="82"/>
    <line x1="80" y1="68" x2="90" y2="68"/>
    <line x1="80" y1="82" x2="90" y2="82"/>
  </g>

  <!-- IC chip outline (right decorative) -->
  <g stroke="#00F0FF" stroke-width="0.8" opacity="0.08">
    <rect x="1120" y="230" width="50" height="30" rx="2"/>
    <line x1="1120" y1="238" x2="1110" y2="238"/>
    <line x1="1120" y1="252" x2="1110" y2="252"/>
    <line x1="1170" y1="238" x2="1180" y2="238"/>
    <line x1="1170" y1="252" x2="1180" y2="252"/>
  </g>

  <!-- Resistor symbol (bottom-left decorative) -->
  <g stroke="#00F0FF" stroke-width="0.8" opacity="0.06" transform="translate(100, 260)">
    <path d="M 0 0 L 5 0 L 8 -6 L 14 6 L 20 -6 L 26 6 L 32 -6 L 35 0 L 40 0"/>
  </g>

  <!-- Capacitor symbol (top-right decorative) -->
  <g stroke="#00F0FF" stroke-width="0.8" opacity="0.06" transform="translate(1060, 50)">
    <line x1="0" y1="5" x2="10" y2="5"/>
    <line x1="10" y1="0" x2="10" y2="10"/>
    <line x1="14" y1="0" x2="14" y2="10"/>
    <line x1="14" y1="5" x2="24" y2="5"/>
  </g>

  <!-- Title: ProtoPulse -->
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">Proto</tspan><tspan fill="#00F0FF" filter="url(#cyan-glow)">Pulse</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="185" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#5A6B8A" font-weight="400" letter-spacing="6">
    ONE TOOL FROM LEARNING TO MANUFACTURING
  </text>

  <!-- Accent line -->
  <line x1="460" y1="205" x2="740" y2="205" stroke="#00F0FF" stroke-width="0.5" opacity="0.3"/>

  <!-- Metric pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- 24 Tables -->
    <rect x="295" y="228" width="90" height="28" rx="14" fill="#0D1B2A" stroke="#1B3A5C" stroke-width="0.5"/>
    <text x="340" y="247" font-size="12" fill="#5A6B8A">
      <tspan fill="#00F0FF" font-weight="700">27</tspan> tables
    </text>
    <!-- 79 AI Tools -->
    <rect x="405" y="228" width="100" height="28" rx="14" fill="#0D1B2A" stroke="#1B3A5C" stroke-width="0.5"/>
    <text x="455" y="247" font-size="12" fill="#5A6B8A">
      <tspan fill="#00F0FF" font-weight="700">82</tspan> AI tools
    </text>
    <!-- 14+ Formats -->
    <rect x="525" y="228" width="110" height="28" rx="14" fill="#0D1B2A" stroke="#1B3A5C" stroke-width="0.5"/>
    <text x="580" y="247" font-size="12" fill="#5A6B8A">
      <tspan fill="#00F0FF" font-weight="700">14+</tspan> formats
    </text>
    <!-- 1,553 Tests -->
    <rect x="655" y="228" width="105" height="28" rx="14" fill="#0D1B2A" stroke="#1B3A5C" stroke-width="0.5"/>
    <text x="707" y="247" font-size="12" fill="#5A6B8A">
      <tspan fill="#00F0FF" font-weight="700">1,553</tspan> tests
    </text>
    <!-- TypeScript Strict -->
    <rect x="780" y="228" width="130" height="28" rx="14" fill="#0D1B2A" stroke="#1B3A5C" stroke-width="0.5"/>
    <text x="845" y="247" font-size="12" fill="#5A6B8A">
      <tspan fill="#00F0FF" font-weight="700">strict</tspan> TypeScript
    </text>
  </g>

  <!-- Bottom edge glow -->
  <rect x="0" y="318" width="1200" height="2" fill="#00F0FF" opacity="0.15"/>
</svg>
