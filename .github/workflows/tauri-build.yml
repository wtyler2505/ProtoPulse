name: Tauri build matrix

# Cross-platform Tauri v2 desktop build per `docs/decisions/2026-05-10-adr-release-trust-model.md`
# Decision 4 (initial release matrix: Win-x64, macOS x64+arm64, Linux x64 with deb+AppImage).
# Per Q5+Q6 ratified defaults, this workflow stays dev-preview-only until Tyler provides:
#   - Windows: Azure Artifact Signing eligibility OR an OV/HSM cert path
#   - macOS:   a paid Apple Developer Program account + Developer ID cert + notary credentials
# Until then, artifacts are produced UNSIGNED and labelled non-production in releases.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # tauri-action creates a draft release on tag pushes
  id-token: write   # required for GitHub artifact attestations (Phase 5.2)

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,    label: linux-x64 }
          # R5 Deferral #1: Linux ARM64 expansion. ubuntu-24.04-arm is a GA
          # GitHub-hosted runner (verified https://docs.github.com/en/actions/
          # reference/runners/github-hosted-runners 2026-05-12). Sidecar
          # binary SHA256 reserved in scripts/tauri/prepare-arduino-sidecar.ts
          # since Wave 8.
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu,   label: linux-arm64 }
          - { os: macos-latest,     target: x86_64-apple-darwin,         label: macos-x64 }
          - { os: macos-14,         target: aarch64-apple-darwin,        label: macos-arm64 }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,      label: windows-x64 }
    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux Tauri deps (WebKit2GTK + tooling)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file \
            build-essential \
            curl \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Frontend build (Vite + esbuild server)
        run: npm run build

      # R4 retro Wave 7/8 + R5 follow-up: Arduino CLI sidecar must be
      # downloaded + SHA256-verified + placed at
      # src-tauri/binaries/arduino-cli-<target-triple> BEFORE tauri-action
      # bundles. `bundle.externalBin` in tauri.conf.json declares the
      # sidecar; missing binary = bundle failure.
      - name: Prepare Arduino CLI sidecar
        run: npm run tauri:prepare-sidecars -- --target ${{ matrix.target }}

      - name: Tauri build (release, unsigned dev preview)
        uses: tauri-apps/tauri-action@v0
        env:
          # Signing/notarization secrets stay UNDEFINED until Tyler provides them.
          # tauri-action skips signing silently when secrets are absent.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri --
          args: --target ${{ matrix.target }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('ProtoPulse {0} (dev preview)', github.ref_name) || '' }}
          releaseBody: |
            **Dev preview — unsigned artifacts.** Not for public distribution until signing
            (`docs/decisions/2026-05-10-adr-release-trust-model.md` Q5+Q6) is wired in.
          releaseDraft: true
          prerelease: true

      # R4 retro Wave 7 (C8+C21): supply-chain check + SBOM generation is now
      # MANDATORY in CI. cargo-cyclonedx + @cyclonedx/cyclonedx-npm produce
      # CycloneDX JSON SBOMs uploaded as workflow artifacts with fail-on-empty.
      # Supply-chain + SBOM generation runs ONCE on linux-x64 to avoid
      # producing duplicate SBOMs per architecture. The npm/cargo dependency
      # graphs are architecture-independent; one SBOM covers all targets.
      - name: Install supply-chain tools (cargo-audit, cargo-cyclonedx)
        if: matrix.label == 'linux-x64'
        run: |
          cargo install --locked cargo-audit
          cargo install --locked cargo-cyclonedx

      - name: Supply-chain check + SBOM generation (Phase 5.2 / R4 retro)
        if: matrix.label == 'linux-x64'
        run: bash scripts/ci/supply-chain-check.sh
        # NO continue-on-error — supply-chain failures (audit warnings, missing
        # SBOM output) block the workflow per R4 retro C8+C21 closure.

      - name: Upload SBOM artifacts
        if: matrix.label == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.label }}
          path: artifacts/sbom/
          if-no-files-found: error   # R4 retro C8+C21: hard-fail if SBOM step produced nothing.
          retention-days: 14

      # R5 #5 follow-up (per docs/decisions/2026-05-12-adr-slsa-provenance.md
      # §"SBOM attestation linkage" — deferred to a later R5.x). Chains the
      # CycloneDX SBOMs to GitHub artifact attestations via attest-sbom@v2.
      # Only on tagged releases (consistent with attest-build-provenance gating).
      - name: Attest SBOM artifacts (SLSA linkage, tagged releases only)
        if: matrix.label == 'linux-x64' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-sbom@v2
        with:
          subject-path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
          sbom-path: artifacts/sbom/protopulse-rust.cdx.json
        continue-on-error: true   # SBOM attestation is a hardening enhancement; fail-open until first tagged release validates the wiring

      - name: Packaged smoke (Phase 5 closeout)
        if: matrix.label == 'linux-x64'
        run: bash scripts/ci/tauri-packaged-smoke.sh
        continue-on-error: true

      - name: Verify signed artifacts (Phase 7.2, dry-run until secrets land)
        if: ${{ !startsWith(matrix.os, 'ubuntu') }}
        run: bash scripts/ci/verify-signed-artifacts.sh --dry-run
        shell: bash
        continue-on-error: true   # signing not yet activated; flip when Tyler-owned cert lands

      - name: Upload dev-preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: protopulse-${{ matrix.label }}-dev-preview
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
            src-tauri/target/release/bundle/**
          if-no-files-found: warn
          retention-days: 14

      # R5 Deferral #5 (per docs/decisions/2026-05-12-adr-slsa-provenance.md):
      # SLSA Level 2+ build provenance via GitHub artifact attestations.
      # id-token: write is already granted at the workflow level. Sigstore
      # under the hood; no ProtoPulse-owned signing key needed.
      #
      # Only fires for tag pushes (release events) — feature-branch PRs don't
      # need attestation overhead.
      - name: Attest build provenance (SLSA Level 2+, tagged releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*-setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*-setup.exe
            src-tauri/target/release/bundle/**/*.dmg
        continue-on-error: false   # SLSA attestation is REQUIRED for any tagged release
