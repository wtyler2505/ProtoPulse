# Ars Contexta -- ProtoPulse Knowledge System Configuration
# Master config for all vault behaviors
# Generated: 2026-04-05

# --- Dimension Positions ---
dimensions:
  granularity: atomic
  organization: flat
  linking: explicit+implicit
  processing: heavy
  navigation: 3-tier
  maintenance: condition-based
  schema: dense
  automation: full

# --- Feature Flags ---
features:
  wiki_links: true
  atomic_notes: true
  mocs: true
  processing_pipeline: true
  schema_validation: true
  condition_maintenance: true
  self_evolution: true
  self_space: true
  semantic_search: true
  graph_analysis: true
  personality: true
  session_rhythm: true
  templates: true
  ethical_guardrails: true
  helper_functions: true

# --- Processing Settings ---
processing:
  extraction_categories:
    - claims
    - architecture-decisions
    - domain-knowledge
    - competitive-insights
    - ux-patterns
    - technical-debt
    - implementation-patterns
    - user-needs
  pipeline_batch_size: 5
  queue_max_depth: 200
  auto_connect_on_extract: true
  auto_revisit_on_connect: false

# --- Maintenance Thresholds ---
maintenance:
  inbox_overflow_threshold: 20
  observation_backlog_threshold: 10
  tension_backlog_threshold: 5
  queue_depth_warning: 15
  orphan_ratio_warning: 0.15
  staleness_days: 30
  connection_density_minimum: 2.0
  topic_map_coverage_minimum: 0.80

# --- Personality ---
personality:
  warmth: warm
  opinionatedness: opinionated
  formality: casual
  emotional_awareness: task-focused

# --- Vault Structure ---
vault:
  knowledge_dir: knowledge/
  inbox_dir: inbox/
  archive_dir: archive/
  self_dir: self/
  ops_dir: ops/
  templates_dir: templates/
  manual_dir: manual/
  vault_marker: .arscontexta

# --- Git Integration ---
git:
  auto_commit: true
  commit_prefix: "vault"
  no_verify: true

# --- Session ---
session:
  capture_enabled: true
  sessions_dir: ops/sessions/
  orient_on_start: true